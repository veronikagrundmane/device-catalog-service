server:
  port: 8080

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: device-catalog-service-route
              uri: http://device-catalog-service:8081
              predicates:
                - Path=/api/devices/**

            - id: order-service-route
              uri: http://order-service:8082
              predicates:
                - Path=/api/orders/**